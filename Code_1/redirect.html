<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig für die mobile Ansicht und korrekte Skalierung -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eis-Überraschung!</title>
    <style>
        /* CSS STYLES */
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Comic Sans MS", sans-serif;
            background-color: #fff8f0;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        /* Hero-Bereich mit Bild für Mobilgeräte */
        .header-image-container {
            width: 100%;
            max-height: 45vh; /* Verhindert, dass das Bild das ganze Handy ausfüllt */
            overflow: hidden;
            border-bottom: 6px solid #ffcb05;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Passt das Bild ohne Verzerrung an */
            display: block;
        }

        /* Hauptinhalt-Container */
        .main-card {
            padding: 24px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Ankündigungstext */
        .mama-tag {
            background-color: #ff4757;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(255, 71, 87, 0.3);
        }

        /* Hauptüberschrift */
        .nachricht {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.3;
            color: #2f3542;
            margin-bottom: 16px;
        }

        /* Kinder-Hinweis */
        .kinder-badge {
            font-size: 1.2rem;
            color: #ffa502;
            font-weight: bold;
            margin-bottom: 24px;
        }

        /* Kinderfreundlicher, großer Touch-Button */
        .action-button {
            width: 100%;
            max-width: 300px;
            padding: 18px 24px;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            border: none;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(30, 144, 255, 0.4);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Feedback beim Antippen auf dem Smartphone */
        .action-button:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(30, 144, 255, 0.4);
        }

        /* Leichte Animation für Kinderansprache */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite ease-in-out;
        }

        /* Spezielle Anpassungen für sehr kleine Handys (z.B. iPhone SE) */
        @media (max-height: 667px) {
            .header-image-container {
                max-height: 35vh;
            }
            .nachricht {
                font-size: 1.5rem;
            }
            .main-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Das Eis-Bild oben -->
    <div class="header-image-container">
        <img src="ice.jpg" alt="Leckeres Eis" class="header-image">
    </div>

    <!-- Inhalt für das Handy -->
    <main class="main-card">
        <div>
            <span class="mama-tag">Tolle Nachricht!</span>
            <h1 class="nachricht">🍦 Dass habt ihr toll gemacht, jetzt gibts ein Eis 🍦</h1>
        </div>

        <button class="action-button pulse" onclick="alert('🎉 Ab zur Eisdiele!')">
            Juhu, Eis holen! 😋
        </button>
    </main>

</body>
</html>

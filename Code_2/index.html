<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildseite</title>
<style>
:root{
  --frame-color:#5bbf2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:#f4f4f4;
  font-family:Arial,sans-serif;
}
.image-container{
  padding:12px;
  border:6px solid var(--frame-color);
  border-radius:18px;
  background:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  max-width:90vw;
  max-height:90vh;
}
.image-container img{
  display:block;
  max-width:100%;
  max-height:calc(90vh - 24px);
  border-radius:10px;
  object-fit:contain;
}
</style>
</head>
<body>
<div class="image-container">
  <img src="./huhn.png" alt="Bild">
</div>
</body>
</html>
